global:
  scrape_interval: 5s      # scrape every 5s — good for a dev environment
  evaluation_interval: 5s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:9090"]
    metrics_path: /metrics

  - job_name: worker
    static_configs:
      - targets: ["worker:9091"]
    metrics_path: /metrics

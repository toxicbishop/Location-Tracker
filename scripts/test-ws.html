<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Live Tracker — Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --success: #10b981;
            --error: #ef4444;
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .connected .status-dot {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        .disconnected .status-dot { background: var(--error); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: var(--text-dim);
            width: 18px;
            height: 18px;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: var(--bg);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            filter: brightness(1.1);
        }

        button:active { transform: translateY(0); }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: transform 0.3s;
        }

        .stat-box:hover {
            background: rgba(255,255,255,0.05);
            transform: scale(1.02);
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            font-weight: 600;
            color: white;
        }

        .stat-full { grid-column: span 2; }

        .console {
            background: #000;
            border-radius: 12px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            height: 140px;
            overflow-y: auto;
            border: 1px solid var(--border);
            color: #888;
            scrollbar-width: thin;
        }

        .console::-webkit-scrollbar { width: 4px; }
        .console::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .log-entry { margin-bottom: 0.25rem; display: flex; gap: 0.75rem; }
        .log-time { color: #444; flex-shrink: 0; }
        .log-msg-success { color: var(--success); }
        .log-msg-error { color: var(--error); }
        .log-msg-info { color: var(--primary); }

        .coords-pulse {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary-glow);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <header>
                <h1>Mission Control</h1>
                <div id="statusWrapper" class="status-badge disconnected">
                    <div class="status-dot"></div>
                    <span id="statusText">System Offline</span>
                </div>
            </header>

            <div class="control-panel">
                <div class="input-wrapper">
                    <i data-lucide="key"></i>
                    <input type="password" id="apiKey" placeholder="Authentication Key" value="test-api-key">
                </div>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="driverId" placeholder="Target Driver ID" value="driver-1">
                </div>
                <button id="connectBtn">
                    <i data-lucide="zap"></i>
                    Establish Link
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label"><i data-lucide="map-pin" style="width:12px"></i> Latitude</div>
                    <div id="lat" class="stat-value">0.000000</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label"><i data-lucide="map-pin" style="width:12px"></i> Longitude</div>
                    <div id="lng" class="stat-value">0.000000</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label"><i data-lucide="gauge" style="width:12px"></i> Speed</div>
                    <div id="speed" class="stat-value">0.0 km/h</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label"><i data-lucide="clock" style="width:12px"></i> Last Ping</div>
                    <div id="time" class="stat-value">--:--:--</div>
                </div>
            </div>

            <div class="console" id="logs">
                <div class="log-entry">
                    <span class="log-time">[SYSTEM]</span>
                    <span>Awaiting uplink instructions...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        let socket;
        const driverIdInput = document.getElementById('driverId');
        const apiKeyInput = document.getElementById('apiKey');
        const connectBtn = document.getElementById('connectBtn');
        const statusWrapper = document.getElementById('statusWrapper');
        const statusText = document.getElementById('statusText');
        const logEl = document.getElementById('logs');

        function log(msg, type = '') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'log-time';
            timeSpan.textContent = new Date().toLocaleTimeString([], { hour12: false });
            
            const msgSpan = document.createElement('span');
            if (type) msgSpan.className = `log-msg-${type}`;
            msgSpan.textContent = msg;
            
            entry.appendChild(timeSpan);
            entry.appendChild(msgSpan);
            
            logEl.prepend(entry);
            if (logEl.children.length > 50) logEl.lastChild.remove();
        }

        function updateUIEffect() {
            const values = document.querySelectorAll('.stat-value');
            values.forEach(el => {
                el.classList.add('coords-pulse');
                setTimeout(() => el.classList.remove('coords-pulse'), 500);
            });
        }

        connectBtn.onclick = () => {
            if (socket) {
                socket.close();
            }

            const driverId = driverIdInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            
            if (!driverId) {
                log('ERROR: Driver ID required', 'error');
                return;
            }

            const url = `ws://${window.location.hostname || 'localhost'}:8080/ws/driver/${driverId}?api_key=${apiKey}`;
            log(`INIT: Attempting secure handshake...`, 'info');
            
            try {
                socket = new WebSocket(url);

                socket.onopen = () => {
                    statusWrapper.className = 'status-badge connected';
                    statusText.innerText = 'Uplink Active';
                    connectBtn.innerHTML = '<i data-lucide="refresh-cw"></i> Secure Re-link';
                    lucide.createIcons();
                    log('SECURE: Connection established successfully.', 'success');
                };

                socket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        document.getElementById('lat').innerText = data.lat.toFixed(6);
                        document.getElementById('lng').innerText = data.lng.toFixed(6);
                        document.getElementById('speed').innerText = data.speed.toFixed(1) + ' km/h';
                        document.getElementById('time').innerText = new Date(data.recorded_at).toLocaleTimeString([], { hour12: false });
                        
                        updateUIEffect();
                        log(`DATA: Received packet [LAT:${data.lat.toFixed(3)} LNG:${data.lng.toFixed(3)}]`);
                    } catch (e) {
                        log('PARSE: Received malformed packet', 'error');
                    }
                };

                socket.onclose = () => {
                    statusWrapper.className = 'status-badge disconnected';
                    statusText.innerText = 'Link Severed';
                    log('WARN: Connection terminated by remote host.', 'error');
                };

                socket.onerror = (err) => {
                    log('FAIL: Handshake rejected. Check API Key.', 'error');
                };
            } catch (e) {
                log(`CRIT: ${e.message}`, 'error');
            }
        };
    </script>
</body>
</html>

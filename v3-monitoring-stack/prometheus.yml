global:
  scrape_interval: 5s      # scrape every 5s — good for a dev environment
  evaluation_interval: 5s

scrape_configs:
  - job_name: producer
    static_configs:
      - targets: ["producer:9090"]
    metrics_path: /metrics

  - job_name: consumer
    static_configs:
      - targets: ["consumer:9091"]
    metrics_path: /metrics
